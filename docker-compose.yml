services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # In-container 5000 matches EXPOSE, healthcheck; local host API default is 5002 (see backend/.env.example).
      PORT: 5000
      SERVE_FRONTEND: "false"
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-ecommerce}
      PGUSER: ${POSTGRES_USER:-ecommerce}
      PGPASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PGSSLMODE: disable
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      # Non-empty defaults: ${VAR:-} injects "" and disables the S3 image proxy in-container
      # (backend/.env is not copied into the image — see .dockerignore).
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-bucket-7i9ax7}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-https://bucket-7i9ax7.s3.us-east-1.amazonaws.com}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-products}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    secrets:
      - postgres_password
      - jwt_secret
    volumes:
      - backend_uploads:/app/backend/uploads
    ports:
      # Host port defaults to 5002 to match backend/.env.example PORT. Use a different BACKEND_PORT
      # only if 5002 is taken; keep it aligned with frontend DEV_PROXY_TARGET when using Vite.
      - "127.0.0.1:${BACKEND_PORT:-5002}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  backend_uploads:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
