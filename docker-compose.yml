services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # Same credential file as host loadEnv; avoids empty AWS_* from `environment:` wiping keys.
    env_file:
      - path: env/aws/.env
        required: false
    environment:
      NODE_ENV: production
      # In-container 5000 matches EXPOSE, healthcheck; local host API default is 5002 (see env/backend/.env.example).
      PORT: 5000
      SERVE_FRONTEND: "false"
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SQLITE_DATABASE_PATH: /app/backend/data/ecommerce.sqlite
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      # Non-empty defaults: ${VAR:-} injects "" and disables the S3 image proxy in-container
      # (env/backend/.env is not copied into the image — see .dockerignore).
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-bucket-7i9ax7}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-https://bucket-7i9ax7.s3.us-east-1.amazonaws.com}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-products}
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: use env/aws/.env (env_file above) or export
      # before `docker compose up` so the SDK can GetObject for /api/media/s3 (do not use VAR:- here).
    secrets:
      - jwt_secret
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_upload:/app/backend/upload
      - backend_sqlite:/app/backend/data
    ports:
      # Default 5004 (not 5002): host `npm start` in backend/ uses PORT=5002 + Vite proxy; publishing
      # the container on the same host port would block the local API. Override BACKEND_PORT if needed.
      - "127.0.0.1:${BACKEND_PORT:-5004}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  backend_uploads:
  backend_upload:
  backend_sqlite:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
