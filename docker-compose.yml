networks:
  proxy:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    networks:
      - default
      - proxy
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Same credential file as host loadEnv; avoids empty AWS_* from `environment:` wiping keys.
    env_file:
      - path: env/aws/.env
        required: false
    environment:
      NODE_ENV: production
      # In-container 5000 matches EXPOSE, healthcheck; local host API default is 5002 (see env/backend/.env.example).
      PORT: 5000
      SERVE_FRONTEND: "false"
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-ecommerce}@postgres:5432/${POSTGRES_DB:-ecommerce}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      # Non-empty defaults: ${VAR:-} injects "" and disables the S3 image proxy in-container
      # (env/backend/.env is not copied into the image — see .dockerignore).
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-bucket-7i9ax7}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-https://bucket-7i9ax7.s3.us-east-1.amazonaws.com}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-products}
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: use env/aws/.env (env_file above) or export
      # before `docker compose up` so the SDK can GetObject for /api/media/s3 (do not use VAR:- here).
    secrets:
      - jwt_secret
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_upload:/app/backend/upload
    ports:
      # Default 5004 (not 5002): host `npm start` in backend/ uses PORT=5002 + Vite proxy; publishing
      # the container on the same host port would block the local API. Override BACKEND_PORT if needed.
      - "127.0.0.1:${BACKEND_PORT:-5004}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    networks:
      - default
      - proxy
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-https://backend.ecommerce.harshildex.com}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    networks:
      - default
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9000:9000"

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  # One-shot: creates proxy hosts via NPM API (idempotent). Requires NPM admin credentials.
  npm-bootstrap:
    image: python:3.12-alpine
    restart: "no"
    depends_on:
      nginx-proxy-manager:
        condition: service_started
      frontend:
        condition: service_healthy
    networks:
      - proxy
    env_file:
      - path: env/npm-bootstrap/.env
        required: false
    environment:
      NPM_INTERNAL_URL: http://nginx-proxy-manager:81
      NPM_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL:-admin@example.com}
      NPM_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD:-}
      NPM_USE_DEFAULT_CREDENTIALS: ${NPM_USE_DEFAULT_CREDENTIALS:-1}
      NPM_DISABLE_BOOTSTRAP: ${NPM_DISABLE_BOOTSTRAP:-0}
      NPM_STOREFRONT_DOMAIN: ${NPM_STOREFRONT_DOMAIN:-ecommerce.harshildex.com}
      NPM_API_DOMAIN: ${NPM_API_DOMAIN:-backend.ecommerce.harshildex.com}
      NPM_FORWARD_STOREFRONT: ${NPM_FORWARD_STOREFRONT:-frontend}
      NPM_FORWARD_STOREFRONT_PORT: ${NPM_FORWARD_STOREFRONT_PORT:-80}
      NPM_FORWARD_API: ${NPM_FORWARD_API:-backend}
      NPM_FORWARD_API_PORT: ${NPM_FORWARD_API_PORT:-5000}
      NPM_AUTO_TLS: ${NPM_AUTO_TLS:-1}
      NPM_LETSENCRYPT_EMAIL: ${NPM_LETSENCRYPT_EMAIL:-}
      NPM_FORCE_SSL: ${NPM_FORCE_SSL:-1}
      NPM_HSTS_ENABLED: ${NPM_HSTS_ENABLED:-0}
      NPM_HSTS_SUBDOMAINS: ${NPM_HSTS_SUBDOMAINS:-0}
    volumes:
      - ./deploy/lightsail/npm_bootstrap.py:/usr/local/bin/npm_bootstrap.py:ro
    command: ["python3", "/usr/local/bin/npm_bootstrap.py"]

volumes:
  postgres_data:
  backend_uploads:
  backend_upload:
  portainer_data:
  npm_data:
  npm_letsencrypt:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
