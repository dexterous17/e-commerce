# Optional: run Nginx Proxy Manager next to the Lightsail stack on a shared Docker network.
# NPM can forward by container name (no host.docker.internal / 172.17.0.1).
#
#   docker compose -f docker-compose.lightsail.yml -f docker-compose.nginx-proxy-manager.yml up -d --build
#
# Admin UI: http://<server-ip>:81  — default login is often admin@example.com / changeme (change immediately).
#
# Proxy hosts for ecommerce.harshildex.com and backend.ecommerce.harshildex.com are created
# automatically by the one-shot `npm-bootstrap` service (deploy/lightsail/npm_bootstrap.py),
# unless disabled. The storefront host’s advanced config routes /api, /api/media, and /uploads
# to the API container (same app as backend.ecommerce.harshildex.com); other paths go to the SPA.
# If NPM_LETSENCRYPT_EMAIL is set (or NPM_ADMIN_EMAIL is a real address), bootstrap also requests
# a shared Let's Encrypt certificate and attaches it to both hosts. Set NPM_ADMIN_PASSWORD after
# you change the admin password, or use NPM_USE_DEFAULT_CREDENTIALS=1 only for the first boot
# (then rotate). See env/npm-bootstrap/.env.example.
#
# To disable auto bootstrap: NPM_DISABLE_BOOTSTRAP=1
#
# Manual UI setup (if you skip bootstrap): deploy/lightsail/nginx-proxy-manager-setup.txt
#
# Ensure host ports 80/443/81 are free (stop system nginx or another NPM stack first).
# Override with NPM_HTTP_PORT, NPM_HTTPS_PORT, NPM_ADMIN_PORT if needed.

networks:
  proxy:

services:
  backend:
    networks:
      - default
      - proxy

  frontend:
    networks:
      - default
      - proxy

  portainer:
    networks:
      - default
      - proxy

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  # One-shot: creates proxy hosts via NPM API (idempotent). Requires NPM admin credentials.
  npm-bootstrap:
    image: python:3.12-alpine
    restart: "no"
    depends_on:
      nginx-proxy-manager:
        condition: service_started
      frontend:
        condition: service_healthy
    networks:
      - proxy
    env_file:
      - path: env/npm-bootstrap/.env
        required: false
    environment:
      NPM_INTERNAL_URL: http://nginx-proxy-manager:81
      NPM_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL:-admin@example.com}
      NPM_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD:-}
      NPM_USE_DEFAULT_CREDENTIALS: ${NPM_USE_DEFAULT_CREDENTIALS:-1}
      NPM_DISABLE_BOOTSTRAP: ${NPM_DISABLE_BOOTSTRAP:-0}
      NPM_STOREFRONT_DOMAIN: ${NPM_STOREFRONT_DOMAIN:-ecommerce.harshildex.com}
      NPM_API_DOMAIN: ${NPM_API_DOMAIN:-backend.ecommerce.harshildex.com}
      NPM_FORWARD_STOREFRONT: ${NPM_FORWARD_STOREFRONT:-frontend}
      NPM_FORWARD_STOREFRONT_PORT: ${NPM_FORWARD_STOREFRONT_PORT:-80}
      NPM_FORWARD_API: ${NPM_FORWARD_API:-backend}
      NPM_FORWARD_API_PORT: ${NPM_FORWARD_API_PORT:-5000}
      NPM_AUTO_TLS: ${NPM_AUTO_TLS:-1}
      NPM_LETSENCRYPT_EMAIL: ${NPM_LETSENCRYPT_EMAIL:-}
      NPM_FORCE_SSL: ${NPM_FORCE_SSL:-1}
      NPM_HSTS_ENABLED: ${NPM_HSTS_ENABLED:-0}
      NPM_HSTS_SUBDOMAINS: ${NPM_HSTS_SUBDOMAINS:-0}
      NPM_PORTAINER_DOMAIN: ${NPM_PORTAINER_DOMAIN:-portainer.harshildex.com}
      NPM_FORWARD_PORTAINER: ${NPM_FORWARD_PORTAINER:-portainer}
      NPM_FORWARD_PORTAINER_PORT: ${NPM_FORWARD_PORTAINER_PORT:-9000}
    volumes:
      - ./deploy/lightsail/npm_bootstrap.py:/usr/local/bin/npm_bootstrap.py:ro
    command: ["python3", "/usr/local/bin/npm_bootstrap.py"]

volumes:
  npm_data:
  npm_letsencrypt:
