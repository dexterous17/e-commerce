# Option A — system nginx on the host (no Nginx Proxy Manager):
#   sudo ln -sf /etc/nginx/sites-available/ecommerce /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Option B — Nginx Proxy Manager in Docker: do not use this file as-is.
#   Configure Proxy Hosts in the NPM UI; see nginx-proxy-manager-setup.txt
#   in this folder (forward to host port 8080 / 5004, not 127.0.0.1 from NPM).
#
# DNS (same A/AAAA as your Lightsail instance):
#   ecommerce.harshildex.com           -> frontend container (SPA + /api via container nginx)
#   backend.ecommerce.harshildex.com   -> Node API (PayPal webhooks, direct API access)
#
# TLS: sudo certbot --nginx -d ecommerce.harshildex.com -d backend.ecommerce.harshildex.com
#
# Ports must match docker-compose.lightsail.yml (defaults: frontend 8080, backend 5004).

upstream ecommerce_frontend {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ecommerce_api {
    server 127.0.0.1:5004;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ecommerce.harshildex.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://ecommerce_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.ecommerce.harshildex.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
