# Install on the Lightsail host (system nginx), then reload:
#   sudo cp deploy/lightsail/ecommerce-domains.conf /etc/nginx/sites-available/ecommerce-domains.conf
#   sudo ln -sf /etc/nginx/sites-available/ecommerce-domains.conf /etc/nginx/sites-enabled/ecommerce-domains.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Upstreams must match docker-compose.lightsail.yml publish ports (defaults 8080 / 5004).
# Storefront: /api, /api/media, /uploads → API container; / → SPA container.
# backend.ecommerce.harshildex.com → same API (PayPal webhooks, direct API use).

upstream ecommerce_frontend {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ecommerce_api {
    server 127.0.0.1:5004;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ecommerce.harshildex.com;

    client_max_body_size 50m;

    location ^~ /api/media {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location ^~ /api {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location ^~ /uploads {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://ecommerce_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.ecommerce.harshildex.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
