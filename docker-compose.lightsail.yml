# AWS Lightsail / VM: frontend + backend in Docker, Postgres elsewhere.
#
# Prerequisites on the server (same paths as this repo):
#   - env/database/.env  — PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD (or DATABASE_URL)
#   - env/backend/.env     — JWT_SECRET, PayPal, etc.
#   - env/aws/.env         — optional; S3 keys / bucket overrides
#
# If Postgres runs on the SAME machine but outside Docker, 127.0.0.1 in DATABASE_URL will not
# reach the host from inside a container. Use PGHOST=host.docker.internal (and matching
# DATABASE_URL host) in env/database/.env — extra_hosts below makes that work on Linux.
#
# If you also run the repo's `postgres` service (docker-compose.yml) on network e-commerce_default,
# env/database/.env often keeps 127.0.0.1 for host tools. Defaults below use PGHOST=postgres and
# clear DATABASE_URL so discrete PG* vars apply. For RDS only: set LIGHTSAIL_DATABASE_URL in
# repo-root `.env` on the server to the full connection string (overrides the empty default).
#
# Run from repo root:
#   docker compose -f docker-compose.lightsail.yml up -d --build
#
# With Nginx Proxy Manager on the same host (shared Docker network):
#   docker compose -f docker-compose.lightsail.yml -f docker-compose.nginx-proxy-manager.yml up -d --build
#   See deploy/lightsail/nginx-proxy-manager-setup.txt
#
# Open TCP 22, 80, and 443 in the Lightsail networking firewall.
#
# If the storefront loads but shows no products/images, the API may be healthy while Postgres has
# zero rows. Seed from the S3 manifest (on the host, repo root):
#   ./scripts/lightsail-seed-from-manifest.sh
# (destructive to existing seeded users/products — see script header).
#
# Publish API and static app on loopback only so the host nginx (or another reverse proxy)
# can bind :80/:443 and route:
#   ecommerce.example.com          -> 127.0.0.1:${FRONTEND_PORT:-8080}
#   backend.ecommerce.example.com  -> 127.0.0.1:${BACKEND_PORT:-5004}
# Set FRONTEND_PORT / BACKEND_PORT in repo-root `.env` or the shell environment.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: env/database/.env
        required: false
      - path: env/aws/.env
        required: false
      - path: env/backend/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVE_FRONTEND: "false"
      TRUST_PROXY: "true"
      TRUST_PROXY_HOPS: "1"
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-products}
      DATABASE_URL: ${LIGHTSAIL_DATABASE_URL:-}
      PGHOST: ${LIGHTSAIL_PGHOST:-postgres}
    volumes:
      - backend_uploads:/app/backend/uploads
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5004}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  backend_uploads:
