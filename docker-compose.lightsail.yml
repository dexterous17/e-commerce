# AWS Lightsail / VM: frontend + backend in Docker; PostgreSQL is expected to be reachable via DATABASE_URL
# (managed RDS, Neon, Supabase, etc.). The S3 image proxy and bucket settings come from env/aws/.env.
#
# Prerequisites on the server (same paths as this repo):
#   - env/backend/.env     — JWT_SECRET, DATABASE_URL, PayPal, etc.
#   - env/aws/.env         — AWS keys, bucket, region (required for /api/media/s3 when the bucket is private)
#
# Run from repo root:
#   docker compose -f docker-compose.lightsail.yml up -d --build
#
# With Nginx Proxy Manager on the same host (shared Docker network):
#   docker compose -f docker-compose.lightsail.yml -f docker-compose.nginx-proxy-manager.yml up -d --build
#   See deploy/lightsail/nginx-proxy-manager-setup.txt
#
# Open TCP 22, 80, and 443 in the Lightsail networking firewall.
#
# If the storefront loads but shows no products/images, the API may be healthy while the DB has
# zero rows. Seed from the S3 manifest (on the host, repo root):
#   ./scripts/lightsail-seed-from-manifest.sh
# (destructive to existing seeded users/products — see script header).
#
# Publish API and static app on loopback only so the host nginx (or another reverse proxy)
# can bind :80/:443 and route:
#   ecommerce.example.com          -> 127.0.0.1:${FRONTEND_PORT:-8080}
#   backend.ecommerce.example.com  -> 127.0.0.1:${BACKEND_PORT:-5004}
# Set FRONTEND_PORT / BACKEND_PORT in repo-root `.env` or the shell environment.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: env/aws/.env
        required: false
      - path: env/database/.env
        required: false
      - path: env/backend/.env
        required: false
    # Never use ${AWS_*:-} or ${PAYPAL_*:-} here: when the host shell has no such vars,
    # Compose injects "" and overrides env_file — bucket/credentials vanish and images/API break.
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVE_FRONTEND: "false"
      TRUST_PROXY: "true"
      TRUST_PROXY_HOPS: "1"
      AWS_S3_IMAGE_PROXY: "true"
    volumes:
      - ./env:/app/env:ro
      - backend_uploads:/app/backend/uploads
      - backend_upload:/app/backend/upload
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5004}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9000:9000"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha

volumes:
  backend_uploads:
  backend_upload:
  portainer_data:
